<!-- ✅ ONLY ADDITION: SORTING SCRIPT -->

<script>
let sortState = {};

function sortTable(col, type) {
  const table = document.getElementById("myTable");
  const tbody = table.tBodies[0];

  // Skip header row (row 0)
  let rows = Array.from(tbody.rows).slice(1);

  sortState[col] = !sortState[col];
  const asc = sortState[col];

  rows.sort((a, b) => {
    let A = a.cells[col].innerText.trim().toLowerCase();
    let B = b.cells[col].innerText.trim().toLowerCase();

    if (type === "num") {
      return asc ? Number(A) - Number(B) : Number(B) - Number(A);
    }

    return asc ? A.localeCompare(B) : B.localeCompare(A);
  });

  rows.forEach(row => tbody.appendChild(row));
}
</script>
